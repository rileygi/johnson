  }
  h1{
    font-family:'Kalam',cursive;

    margin: 0 0 4px;
    display:flex; align-items:center; gap:10px;
  }
  .subtitle{

  .status-dot{

  nav.tabs{
    display:flex; gap: 6px; margin: 18px 0 20px;

    font-family:'Kalam',cursive;

    box-shadow: 0 -2px 6px rgba(0,0,0,0.04);
  }

  .panel{ display:none; }
  .panel.active{ display:block; }

  /* Calendar */
  .cal-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 10px;
  }
  .cal-head .month-label{
    font-family:'Kalam',cursive; font-size:1.3rem;
  }
  .cal-head button{
    background:none; border:1px solid var(--line); border-radius:6px;

  .weekdays{
    display:grid; grid-template-columns: repeat(7,1fr);

  }
  .grid{
    display:grid; grid-template-columns: repeat(7,1fr); gap:5px;

  .empty-state{

  /* Chart */

  .modal .tape{ left:50%; transform: translateX(-50%) rotate(-2deg); right:auto; }
  .modal h2{
    font-family:'Kalam',cursive; margin: 6px 0 16px; font-size:1.4rem;

  .modal .close{
    position:absolute; top:14px; right:14px; background:none; border:none;

  .field{ margin-bottom: 14px; }
  .field label{
    display:block; font-size:0.75rem; color:var(--ink-soft); margin-bottom:5px;

  .weight-input-row input{

    resize:vertical; min-height:50px; color:var(--ink); padding:2px 0;

  textarea:focus{ outline:none; border-color:var(--pen); }
  .modal-actions{
    display:flex; justify-content:space-between; align-items:center; margin-top: 18px;
  }
  .btn{
    font-family:'JetBrains Mono',monospace; font-size:0.82rem;
    border-radius: 6px; padding: 9px 16px; cursor:pointer; border:none;
  }
  .btn-save{ background: var(--pen); color:var(--white); }
  .btn-save:disabled{ opacity:0.5; cursor:not-allowed; }
  .btn-delete{ background:none; color:var(--stamp); }

  .toast{
    position: fixed; bottom: 22px; left:50%; transform: translateX(-50%);
    background: var(--ink); color: var(--white);
    font-family:'JetBrains Mono',monospace; font-size:0.8rem;
    padding: 10px 18px; border-radius: 6px; opacity:0; pointer-events:none;
    transition: opacity .25s ease, transform .25s ease; z-index:200;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  @media (max-width:560px){
    .book{ padding: 22px 14px 22px 42px; }
    .spiral{ left:8px; width:16px; gap:20px; }
    .spiral span{ width:10px; height:10px; }

    .day{ min-height:56px; padding:4px; }
    .stats-row{ grid-template-columns: repeat(2,1fr); }
    .log-row .note{ display:none; }
  }
</style>
</head>
<body>

<script>
/* =========================================================
   1. Firebase 設定 —— 請把下面換成你自己專案的設定值
   Firebase 主控台 > 專案設定 > 一般 > 我的應用程式 > SDK 設定與程式碼
   ========================================================= */
const firebaseConfig = {
  apiKey: "請貼上你的 apiKey",
  authDomain: "your-project.firebaseapp.com",
  projectId: "your-project-id",
  messagingSenderId: "xxxxxxxxxxxx",
  appId: "1:xxxxxxxxxxxx:web:xxxxxxxxxxxxxxxxxx"
};

let db, firebaseReady = false;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  firebaseReady = true;
}catch(e){
  console.error(e);
}

const COLLECTION = "cat_weight_logs";
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

function setStatus(state, text){
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

/* =========================================================
   2. 全域狀態
   ========================================================= */
let entries = {};      // { "2026-07-01": {weight, note, ...} }
let viewMonth = new Date();
let selectedDate = null;
let chartInstance = null;
let listRange = 30;

const pad = n => String(n).padStart(2,'0');
const toKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const pawSvg = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="8" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="18" cy="8" r="2"/><path d="M12 11c-4 0-7 3-7 6a3 3 0 003 3c1.2 0 1.8-.6 4-.6s2.8.6 4 .6a3 3 0 003-3c0-3-3-6-7-6z"/></svg>`;

/* =========================================================
   3. Firestore 監聽
   ========================================================= */
if(firebaseReady){
  db.collection(COLLECTION).onSnapshot(snap => {
    entries = {};
    snap.forEach(doc => { entries[doc.id] = doc.data(); });
    setStatus('ok', '已連線 · ' + Object.keys(entries).length + ' 筆紀錄');
    renderAll();
  }, err => {
    console.error(err);
    setStatus('err', '連線失敗,請確認 Firebase 設定與規則');
  });
}else{
  setStatus('err', '尚未設定 Firebase');
}

function renderAll(){
  renderCalendar();
  renderList();
  renderChart();
}

/* =========================================================
   4. Tabs
   ========================================================= */
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+btn.dataset.panel).classList.add('active');
    if(btn.dataset.panel === 'chart') renderChart();
  });
});

/* =========================================================
   5. 月曆
   ========================================================= */
document.getElementById('prevMonth').onclick = ()=>{ viewMonth.setMonth(viewMonth.getMonth()-1); renderCalendar(); };
document.getElementById('nextMonth').onclick = ()=>{ viewMonth.setMonth(viewMonth.getMonth()+1); renderCalendar(); };

function renderCalendar(){
  const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
  document.getElementById('monthLabel').textContent = `${y}年 ${m+1}月`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const todayKey = toKey(new Date());

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(y,m,d);
    const key = toKey(dateObj);
    const cell = document.createElement('div');
    cell.className = 'day' + (key===todayKey ? ' today' : '');
    const entry = entries[key];
    cell.innerHTML = `
      <span class="num">${d}</span>
      ${entry && entry.weight!=null ? `<span class="entry">${pawSvg}${entry.weight}kg</span>` : ''}
    `;
    cell.addEventListener('click', ()=> openModal(key));
    grid.appendChild(cell);
  }
}

/* =========================================================
   6. 清單
   ========================================================= */
document.querySelectorAll('.list-filters button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.list-filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    listRange = btn.dataset.range === 'all' ? 'all' : parseInt(btn.dataset.range);
    renderList();
  });
});

function renderList(){
  const wrap = document.getElementById('listWrap');
  let keys = Object.keys(entries).sort().reverse();
  if(listRange !== 'all'){
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - listRange);
    keys = keys.filter(k => new Date(k) >= cutoff);
  }
  if(keys.length === 0){
    wrap.innerHTML = `<div class="empty-state">還沒有紀錄,點月曆的日期開始記第一筆吧 🐾</div>`;
    return;
  }
  const sortedAsc = Object.keys(entries).sort();
  wrap.innerHTML = keys.map(k=>{
    const e = entries[k];
    const idx = sortedAsc.indexOf(k);
    const prevKey = idx>0 ? sortedAsc[idx-1] : null;
    let diffHtml = '';
    if(prevKey && entries[prevKey].weight!=null && e.weight!=null){
      const diff = (e.weight - entries[prevKey].weight);
      if(Math.abs(diff) > 0.001){
        const cls = diff>0 ? 'up' : 'down';
        diffHtml = `<span class="diff ${cls}">${diff>0?'▲':'▼'}${Math.abs(diff).toFixed(2)}</span>`;
      }
    }
    return `
      <div class="log-row" data-key="${k}">
        <span class="date">${k}</span>
        <span class="weight">${e.weight!=null ? e.weight+'kg' : '—'}</span>
        ${diffHtml || '<span class="diff"></span>'}
        <span class="note">${e.note || ''}</span>
      </div>`;
  }).join('');
  wrap.querySelectorAll('.log-row').forEach(row=>{
    row.addEventListener('click', ()=> openModal(row.dataset.key));
  });
}

/* =========================================================
   7. 圖表
   ========================================================= */
function renderChart(){
  const keys = Object.keys(entries).filter(k=>entries[k].weight!=null).sort();
  const labels = keys.map(k=>k.slice(5));
  const data = keys.map(k=>entries[k].weight);

  const statsRow = document.getElementById('statsRow');
  if(keys.length === 0){
    statsRow.innerHTML = '';
    if(chartInstance){ chartInstance.destroy(); chartInstance=null; }
    return;
  }
  const latest = data[data.length-1];
  const avg = (data.reduce((a,b)=>a+b,0)/data.length).toFixed(2);
  const max = Math.max(...data).toFixed(2);
  const min = Math.min(...data).toFixed(2);
  statsRow.innerHTML = `
    <div class="stat-card"><div class="label">最新體重</div><div class="value">${latest}kg</div></div>
    <div class="stat-card"><div class="label">平均</div><div class="value">${avg}kg</div></div>
    <div class="stat-card"><div class="label">最高</div><div class="value">${max}kg</div></div>
    <div class="stat-card"><div class="label">最低</div><div class="value">${min}kg</div></div>
  `;

  const ctx = document.getElementById('weightChart').getContext('2d');
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '體重 (kg)',
        data,
        borderColor: '#5B7385',
        backgroundColor: 'rgba(91,115,133,0.08)',
        pointBackgroundColor: '#E2799A',
        pointRadius: 3,
        tension: 0.25,
        fill: true,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ grid:{ color:'#F0DEE3' }, ticks:{ font:{family:'JetBrains Mono', size:10} } },
        y:{ grid:{ color:'#F0DEE3' }, ticks:{ font:{family:'JetBrains Mono', size:10} } }
      }
    }
  });
}

/* =========================================================
   8. Modal / 新增與編輯
   ========================================================= */
const overlay = document.getElementById('overlay');
const weightInput = document.getElementById('weightInput');
const noteInput = document.getElementById('noteInput');
const deleteBtn = document.getElementById('deleteBtn');
const saveBtn = document.getElementById('saveBtn');

function openModal(key){
  selectedDate = key;
  const e = entries[key] || {};
  document.getElementById('modalDate').textContent = key;
  weightInput.value = e.weight ?? '';
  noteInput.value = e.note ?? '';
  deleteBtn.style.display = entries[key] ? 'inline-block' : 'none';
  overlay.classList.add('active');
}
document.getElementById('closeModal').onclick = ()=> overlay.classList.remove('active');
overlay.addEventListener('click', e=>{ if(e.target === overlay) overlay.classList.remove('active'); });

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

saveBtn.addEventListener('click', async ()=>{
  if(!firebaseReady){ showToast('尚未設定 Firebase'); return; }
  const weightVal = parseFloat(weightInput.value);
  if(isNaN(weightVal)){ showToast('請輸入體重'); return; }

  saveBtn.disabled = true; saveBtn.textContent = '儲存中…';
  try{
    await db.collection(COLLECTION).doc(selectedDate).set({
      date: selectedDate,
      weight: weightVal,
      note: noteInput.value || '',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true});
    showToast('已儲存 🐾');
    overlay.classList.remove('active');
  }catch(err){
    console.error(err);
    showToast('儲存失敗:' + err.message);
  }finally{
    saveBtn.disabled = false; saveBtn.textContent = '儲存';
  }
});

deleteBtn.addEventListener('click', async ()=>{
  if(!confirm('確定要刪除這筆紀錄嗎?')) return;
  try{
    await db.collection(COLLECTION).doc(selectedDate).delete();
    showToast('已刪除');
    overlay.classList.remove('active');
  }catch(err){
    console.error(err);
    showToast('刪除失敗:' + err.message);
  }
});

function spawnPetals(){
  const count = 14;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random()*8;
    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.left = Math.random()*100 + 'vw';
    p.style.animationDuration = (9 + Math.random()*8) + 's';
    p.style.animationDelay = (Math.random()*10) + 's';
    document.body.appendChild(p);
  }
}
spawnPetals();

renderCalendar();
